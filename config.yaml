# ==================================================================
# minquzi 配置文件
# 用户可随时修改本文件，无需改动代码
# ==================================================================

# ---------------------------------------------------------------
# 1. 特殊群组倍率表
# ---------------------------------------------------------------
# 作用：群组名称包含 name 关键字时，实际业绩 = 默认换算 × multiplier
# 匹配方式：模糊匹配（包含即命中）
# 示例：群组 "郑州管城51部(173)" 包含 "郑州管城51部" → 命中，倍率 ×10
special_groups:
  - name: "郑州管城51部"
    multiplier: 10

  # 添加新群组示例（取消注释后使用）：
  # - name: "某某群组关键字"
  #   multiplier: 10

# ---------------------------------------------------------------
# 2. 群组点位映射表
# ---------------------------------------------------------------
# 作用：群组 → 点位（小数，例如 0.3 表示 30%）
# 匹配方式：精确匹配群组全名（去掉末尾括号数字后的名称）
# 应结 = 实际业绩 × 点位
# 未配置的群组，点位和应结留空，由用户手动填写
group_points:
  "天津zz26南开和平门店（五日）": 0.0
  "广深杭果兮": 0.0
  "长沙岳麓（日）🐻": 0.0
  "金牛九里提DK134群（12-2点）": 0.0
  "江浙沪 全位置": 0.0
  "郑州管城51部": 0.0
  "武汉洪山区门店V37部 1-1": 0.0
  "百子湾门店888组12-2大卡唰唰": 0.0
  "紫 闵行 平安鸟36队": 0.0
  "南宁兴宁区 村长": 0.0
  "朝阳周庄s2部2-12": 0.0
  "南通-芜湖果兮-日结": 0.0

  # 添加新群组示例：
  # "新群组名称": 0.3

# ---------------------------------------------------------------
# 3. 输出配置
# ---------------------------------------------------------------
output:
  # Excel 文件名前缀
  filename_prefix: "业绩汇总"
  # 输出目录（相对于 minquzi/）
  directory: "output"
  # 表头顺序（不建议修改）
  columns:
    - 日期
    - 群组
    - 尾号
    - 原始业绩
    - 实际业绩
    - 点位
    - 应结
    - 总监
    - 奖励
    - AI识别异常
    - 原始数据
